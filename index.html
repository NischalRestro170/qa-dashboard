<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QA Feature Dashboard</title>

<style>
body { font-family: Arial; padding: 20px; }

.topbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
button { padding: 6px 10px; cursor: pointer; }

.summary { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
.card { background:#f5f5f5; padding:10px; border-radius:6px; min-width:100px; }
.card .num { font-size:20px; font-weight:bold; }

table { width:100%; border-collapse: collapse; }
th, td { padding:8px; border-bottom:1px solid #ddd; font-size:13px; }

.badge { padding:3px 8px; border-radius:12px; font-size:11px; }
.b-prod { background:#d4edda; }
.b-review { background:#e2e3ff; }
.b-inprog { background:#ffeeba; }
.b-blocked { background:#f8d7da; }
.b-pending { background:#eee; }
.b-qa { background:#800080; }

input, select { width:100%; padding:4px; font-size:12px; }

.active { background:#333; color:#fff; }
</style>
</head>

<body>

<div class="topbar">
  <button onclick="addRow()">+ Add</button>
  <button onclick="exportCSV()">Export</button>

  <button onclick="setFilter('all',this)" class="active">All</button>
  <button onclick="setFilter('In PR',this)">Staging Only</button>
  <button onclick="setFilter('staging',this)">Staging Only</button>
  <button onclick="setFilter('prod',this)">In Prod</button>
  <button onclick="setFilter('blocked',this)">Blocked</button>
  <button onclick="setFilter('qa',this)">In QA</button>
</div>

<div class="summary" id="summary"></div>

<table>
<thead>
<tr>
<th>Feature</th>
<th>Env</th>
<th>Status</th>
<th>Assignee</th>
<th>Deadline</th>
<th>PR</th>
<th>Notes</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
let currentFilter = "all";

const statusMeta = {
  prod: "In production",
  review: "In review",
  inprog: "In progress",
  blocked: "Blocked",
  pending: "Pending",
  qa:"In QA"
};

let rows = JSON.parse(localStorage.getItem("rows")) || [
  { feature:"OAuth", sub:"SSO", env:"s", status:"review", assignee:"Priya", deadline:"2026-04-02", pr:"#341", notes:"Test logout" }
];

function saveStorage() {
  localStorage.setItem("rows", JSON.stringify(rows));
}

function setFilter(type, btn){
  currentFilter = type;
  document.querySelectorAll(".topbar button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function getFiltered(){
  return rows.filter(r=>{
   if(currentFilter==="pr") return r.env==="p";
    if(currentFilter==="staging") return r.env==="s";
    if(currentFilter==="prod") return r.env==="b" || r.status==="prod";
    if(currentFilter==="blocked") return r.status==="blocked";
    if(currentFilter==="qa") return r.status=="qa";
    return true;
  });
}

function render(){
  const data = getFiltered();
  const tbody = document.getElementById("tbody");

  tbody.innerHTML = data.map((r,i)=>`
    <tr>
      <td><b>${r.feature}</b><br><small>${r.sub||""}</small></td>
      <td>${r.env==="s"?"Staging":"Staging+Prod"}</td>
      <td><span class="badge b-${r.status}">${statusMeta[r.status]}</span></td>
      <td>${r.assignee}</td>
      <td>${r.deadline}</td>
      <td><a href="#">${r.pr}</a></td>
      <td>${r.notes}</td>
      <td>
        <button onclick="editRow(${i})">Edit</button>
        <button onclick="delRow(${i})">Delete</button>
      </td>
    </tr>
  `).join("");

  updateSummary();
}

function updateSummary(){
  const total = rows.length;
  const pr = rows.filter(r=>r.env==="p").length;
  const staging = rows.filter(r=>r.env==="s").length;
  const prod = rows.filter(r=>r.env==="b" || r.status==="prod").length;
  const blocked = rows.filter(r=>r.status==="blocked").length;
  const qa = rows.filter(r=>r.status==="review" || r.status==="inprog").length;

  document.getElementById("summary").innerHTML = `
    <div class="card"><div class="num">${total}</div>Total</div>
    <div class="card"><div class="num">${pr}</div>In PR</div>
    <div class="card"><div class="num">${staging}</div>Staging</div>
    <div class="card"><div class="num">${prod}</div>In Prod</div>
    <div class="card"><div class="num">${blocked}</div>Blocked</div>
    <div class="card"><div class="num">${qa}</div>In QA</div>
  `;
}

function addRow(){
  createEditableRow();
}

function editRow(i){
  createEditableRow(rows[i], i);
}

function createEditableRow(data={}, index=null){
  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td>
      <input class="f_name" value="${data.feature||""}" placeholder="Feature">
      <input class="f_sub" value="${data.sub||""}" placeholder="Sub">
    </td>

    <td>
      <select class="f_env">
        <option value="s">Staging</option>
        <option value="b">Staging+Prod</option>
      </select>
    </td>

    <td>
      <select class="f_status">
        <option value="review">In review</option>
        <option value="inprog">In progress</option>
        <option value="prod">In production</option>
        <option value="pending">Pending</option>
        <option value="blocked">Blocked</option>
	<option value="qa">In QA</option>

      </select>
    </td>

    <td><input class="f_assignee" value="${data.assignee||""}"></td>
    <td><input type="date" class="f_deadline" value="${data.deadline||""}"></td>
    <td><input class="f_pr" value="${data.pr||""}"></td>
    <td><input class="f_notes" value="${data.notes||""}"></td>

    <td>
      <button onclick="saveRow(this,${index})">Save</button>
      <button onclick="render()">Cancel</button>
    </td>
  `;

  document.getElementById("tbody").prepend(tr);
}

function saveRow(btn,index){
  const tr = btn.closest("tr");

  const obj = {
    feature: tr.querySelector(".f_name").value,
    sub: tr.querySelector(".f_sub").value,
    env: tr.querySelector(".f_env").value,
    status: tr.querySelector(".f_status").value,
    assignee: tr.querySelector(".f_assignee").value,
    deadline: tr.querySelector(".f_deadline").value,
    pr: tr.querySelector(".f_pr").value,
    notes: tr.querySelector(".f_notes").value
  };

  if(index!=null) rows[index]=obj;
  else rows.unshift(obj);

  saveStorage();
  render();
}

function delRow(i){
  if(confirm("Delete?")){
    rows.splice(i,1);
    saveStorage();
    render();
  }
}

function exportCSV(){
  let csv="Feature,Env,Status,Assignee,Deadline,PR,Notes\n";
  rows.forEach(r=>{
    csv+=`${r.feature},${r.env},${r.status},${r.assignee},${r.deadline},${r.pr},${r.notes}\n`;
  });

  const blob=new Blob([csv]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="data.csv";
  a.click();
}

render();
</script>

</body>
</html>
